
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subway Cat Run</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(#444, #222);
            overflow: hidden;
            border: 4px solid #555;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
        }
        #score {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        button {
            background: #ffcc00;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="score">Score: 0</div>
    </div>
    <div id="instructions">Use LEFT/RIGHT Arrows to move lanes</div>
    <div id="game-over">
        <h2>GAME OVER!</h2>
        <div id="final-score">Score: 0</div>
        <button onclick="resetGame()">Try Again</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreElement = document.getElementById('final-score');

    canvas.width = 400;
    canvas.height = 600;

    // Game Constants
    const LANES = [80, 200, 320];
    let currentLane = 1; // Middle lane
    let score = 0;
    let gameSpeed = 5;
    let isGameOver = false;
    let obstacles = [];
    let frame = 0;

    // Cat Object
    const cat = {
        x: LANES[currentLane],
        y: 500,
        width: 40,
        height: 40,
        targetX: LANES[currentLane],
        color: "#f39c12" // Ginger Cat
    };

    function drawCat() {
        // Smooth lane transition
        cat.x += (cat.targetX - cat.x) * 0.2;

        ctx.save();
        ctx.translate(cat.x, cat.y);

        // Body
        ctx.fillStyle = cat.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, 20, 25, 0, 0, Math.PI * 2);
        ctx.fill();

        // Head
        ctx.beginPath();
        ctx.arc(0, -25, 15, 0, Math.PI * 2);
        ctx.fill();

        // Ears
        ctx.beginPath();
        ctx.moveTo(-12, -35);
        ctx.lineTo(-18, -45);
        ctx.lineTo(-5, -38);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(12, -35);
        ctx.lineTo(18, -45);
        ctx.lineTo(5, -38);
        ctx.fill();

        // Tail (wiggling)
        ctx.strokeStyle = cat.color;
        ctx.lineWidth = 6;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(0, 20);
        ctx.quadraticCurveTo(Math.sin(frame * 0.1) * 10, 40, Math.sin(frame * 0.1) * 5, 50);
        ctx.stroke();

        ctx.restore();
    }

    class Obstacle {
        constructor() {
            this.lane = Math.floor(Math.random() * 3);
            this.x = LANES[this.lane];
            this.y = -100;
            this.width = 60;
            this.height = 30;
            this.type = Math.random() > 0.5 ? 'barrier' : 'trash';
        }

        draw() {
            ctx.fillStyle = this.type === 'barrier' ? '#e74c3c' : '#95a5a6';
            ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
            
            // Draw stripes for barriers
            if(this.type === 'barrier') {
                ctx.strokeStyle = "white";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(this.x - this.width/2, this.y + 15);
                ctx.lineTo(this.x + this.width/2, this.y + 15);
                ctx.stroke();
            }
        }

        update() {
            this.y += gameSpeed;
        }
    }

    function spawnObstacles() {
        if (frame % 60 === 0) {
            obstacles.push(new Obstacle());
        }
    }

    function drawBackground() {
        // Draw track lanes
        ctx.strokeStyle = "#555";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(140, 0); ctx.lineTo(140, 600);
        ctx.moveTo(260, 0); ctx.lineTo(260, 600);
        ctx.stroke();

        // Draw moving dashes to simulate speed
        ctx.strokeStyle = "#666";
        ctx.setLineDash([20, 40]);
        ctx.lineDashOffset = -frame * gameSpeed;
        ctx.beginPath();
        ctx.moveTo(140, 0); ctx.lineTo(140, 600);
        ctx.moveTo(260, 0); ctx.lineTo(260, 600);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function checkCollision(obs) {
        // Simple bounding box check
        const catBox = {
            left: cat.x - 15,
            right: cat.x + 15,
            top: cat.y - 35,
            bottom: cat.y + 20
        };
        const obsBox = {
            left: obs.x - obs.width/2,
            right: obs.x + obs.width/2,
            top: obs.y,
            bottom: obs.y + obs.height
        };

        return !(catBox.right < obsBox.left || 
                 catBox.left > obsBox.right || 
                 catBox.bottom < obsBox.top || 
                 catBox.top > obsBox.bottom);
    }

    function update() {
        if (isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawBackground();
        drawCat();
        spawnObstacles();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();

            if (checkCollision(obstacles[i])) {
                endGame();
            }

            if (obstacles[i].y > canvas.height) {
                obstacles.splice(i, 1);
                score += 10;
                scoreElement.innerText = `Score: ${score}`;
                gameSpeed += 0.01; // Increase difficulty
            }
        }

        frame++;
        requestAnimationFrame(update);
    }

    function endGame() {
        isGameOver = true;
        gameOverScreen.style.display = 'block';
        finalScoreElement.innerText = `Final Score: ${score}`;
    }

    function resetGame() {
        score = 0;
        gameSpeed = 5;
        isGameOver = false;
        obstacles = [];
        frame = 0;
        currentLane = 1;
        cat.targetX = LANES[currentLane];
        cat.x = LANES[currentLane];
        scoreElement.innerText = `Score: 0`;
        gameOverScreen.style.display = 'none';
        update();
    }

    // Input Handling
    window.addEventListener('keydown', (e) => {
        if (isGameOver) return;
        if (e.key === 'ArrowLeft' && currentLane > 0) {
            currentLane--;
        } else if (e.key === 'ArrowRight' && currentLane < 2) {
            currentLane++;
        }
        cat.targetX = LANES[currentLane];
    });

    // Start
    update();
</script>

</body>
</html>
