
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Ball Slasher</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }
        #score {
            font-size: 32px;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #lives {
            font-size: 24px;
            color: #e74c3c;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 2px solid #333;
        }
        button {
            background: #27ae60;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="lives">Lives: XXX</div>
</div>

<div id="game-over">
    <h1>GAME OVER</h1>
    <p id="final-score">Final Score: 0</p>
    <button onclick="resetGame()">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const livesElement = document.getElementById('lives');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreText = document.getElementById('final-score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let lives = 3;
    let isGameOver = false;
    let balls = [];
    let particles = [];
    let slashPoints = [];
    let frame = 0;

    const ballTypes = [
        { name: 'Basketball', color: '#e67e22', size: 40, lines: true },
        { name: 'Tennis Ball', color: '#ccff00', size: 20, lines: false },
        { name: 'Soccer Ball', color: '#ffffff', size: 35, hex: true },
        { name: 'Baseball', color: '#f5f5f5', size: 18, stitches: true },
        { name: 'Pool Ball', color: '#c0392b', size: 25, number: true }
    ];

    class Ball {
        constructor() {
            this.type = ballTypes[Math.floor(Math.random() * ballTypes.length)];
            this.x = Math.random() * (canvas.width - 100) + 50;
            this.y = canvas.height + 50;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = -(Math.random() * 5 + 12);
            this.gravity = 0.15;
            this.radius = this.type.size;
            this.sliced = false;
            this.angle = 0;
            this.rotationSpeed = (Math.random() - 0.5) * 0.1;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);

            // Ball Shadow/Body
            ctx.beginPath();
            ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.type.color;
            ctx.fill();
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Decorative details
            if (this.type.lines) { // Basketball
                ctx.beginPath();
                ctx.moveTo(-this.radius, 0); ctx.lineTo(this.radius, 0);
                ctx.moveTo(0, -this.radius); ctx.lineTo(0, this.radius);
                ctx.stroke();
            }
            if (this.type.hex) { // Soccer
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.font = '20px Arial';
                ctx.fillText('⚽', -12, 8);
            }

            ctx.restore();
        }

        update() {
            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.angle += this.rotationSpeed;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1.0;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, 4, 4);
            ctx.globalAlpha = 1.0;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life -= 0.02;
        }
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function handleInput(clientX, clientY) {
        if (isGameOver) return;
        
        slashPoints.push({x: clientX, y: clientY, life: 10});

        balls.forEach((ball, index) => {
            if (!ball.sliced) {
                const dist = Math.hypot(ball.x - clientX, ball.y - clientY);
                if (dist < ball.radius + 10) {
                    ball.sliced = true;
                    score += 10;
                    scoreElement.innerText = `Score: ${score}`;
                    createExplosion(ball.x, ball.y, ball.type.color);
                }
            }
        });
    }

    // Input Listeners
    canvas.addEventListener('mousemove', (e) => {
        if (e.buttons === 1) handleInput(e.clientX, e.clientY);
    });
    canvas.addEventListener('touchmove', (e) => {
        handleInput(e.touches[0].clientX, e.touches[0].clientY);
    });

    function update() {
        if (isGameOver) return;

        ctx.fillStyle = 'rgba(26, 26, 26, 0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Spawn logic
        if (frame % 60 === 0) balls.push(new Ball());
        if (score > 100 && frame % 40 === 0) balls.push(new Ball());

        // Update & Draw Slash
        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        for(let i=0; i<slashPoints.length; i++) {
            const p = slashPoints[i];
            if(i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
            p.life--;
        }
        ctx.stroke();
        slashPoints = slashPoints.filter(p => p.life > 0);

        // Update Balls
        for (let i = balls.length - 1; i >= 0; i--) {
            balls[i].update();
            if (!balls[i].sliced) balls[i].draw();

            if (balls[i].y > canvas.height + 100) {
                if (!balls[i].sliced) {
                    lives--;
                    updateLives();
                    if (lives <= 0) endGame();
                }
                balls.splice(i, 1);
            }
        }

        // Update Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        frame++;
        requestAnimationFrame(update);
    }

    function updateLives() {
        livesElement.innerText = `Lives: ${'X'.repeat(lives)}`;
    }

    function endGame() {
        isGameOver = true;
        gameOverScreen.style.display = 'block';
        finalScoreText.innerText = `Final Score: ${score}`;
    }

    function resetGame() {
        score = 0;
        lives = 3;
        isGameOver = false;
        balls = [];
        particles = [];
        frame = 0;
        scoreElement.innerText = `Score: 0`;
        updateLives();
        gameOverScreen.style.display = 'none';
        update();
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    updateLives();
    update();
</script>

</body>
</html>
