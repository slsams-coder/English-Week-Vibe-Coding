<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synonym Match</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(4, 100px); gap: 10px; justify-content: center; margin-top: 20px; }
  .card { width: 100px; height: 100px; background: #007bff; color: #007bff; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border-radius: 8px; user-select: none; }
  .card.flipped { background: #fff; border: 2px solid #007bff; color: #333; }
  .card.matched { background: #28a745; color: white; border: none; cursor: default; }
</style>
</head>
<body>
  <h2>Synonym Memory Match</h2>
  <p>Find the matching synonyms!</p>
  <div class="grid" id="grid"></div>
  <h3 id="message"></h3>

  <script>
    const pairs = [
      {word: "Happy", match: "1"}, {word: "Glad", match: "1"},
      {word: "Fast", match: "2"}, {word: "Quick", match: "2"},
      {word: "Smart", match: "3"}, {word: "Clever", match: "3"},
      {word: "Cold", match: "4"}, {word: "Freezing", match: "4"}
    ];
    let cards = pairs.sort(() => 0.5 - Math.random());
    let firstCard = null, secondCard = null;
    let lockBoard = false;
    let matches = 0;

    const grid = document.getElementById('grid');
    
    cards.forEach((item, index) => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.dataset.match = item.match;
      card.innerText = item.word;
      card.addEventListener('click', () => flipCard(card));
      grid.appendChild(card);
    });

    function flipCard(card) {
      if (lockBoard || card === firstCard || card.classList.contains('matched')) return;
      card.classList.add('flipped');

      if (!firstCard) {
        firstCard = card;
        return;
      }
      secondCard = card;
      checkForMatch();
    }

    function checkForMatch() {
      let isMatch = firstCard.dataset.match === secondCard.dataset.match;
      isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
      firstCard.classList.add('matched');
      secondCard.classList.add('matched');
      resetBoard();
      matches++;
      if (matches === 4) document.getElementById('message').innerText = "You found all the synonyms!";
    }

    function unflipCards() {
      lockBoard = true;
      setTimeout(() => {
        firstCard.classList.remove('flipped');
        secondCard.classList.remove('flipped');
        resetBoard();
      }, 1000);
    }

    function resetBoard() {
      [firstCard, secondCard, lockBoard] = [null, null, false];
    }
  </script>
</body>
</html>
