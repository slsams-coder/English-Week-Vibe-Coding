
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Spinner Game</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #ecf0f1;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #e74c3c;
            z-index: 10;
        }

        .center-circle {
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px #1e8449;
            transition: 0.1s;
        }

        button:active {
            box-shadow: 0 0px #1e8449;
            transform: translateY(4px);
        }

        button:disabled {
            background-color: #7f8c8d;
            box-shadow: 0 4px #616a6b;
            cursor: not-allowed;
        }

        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            height: 2rem;
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>
<body>

    <h1>Sports Spinner</h1>
    
    <div class="container">
        <div class="pointer"></div>
        <div class="center-circle"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <button id="spinBtn">SPIN THE WHEEL!</button>
    <div id="result"></div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');

        const sports = [
            'Basketball', 'Soccer', 'Tennis', 'Baseball', 
            'Swimming', 'Volleyball', 'Golf', 'Cricket'
        ];
        
        const colors = [
            '#e67e22', '#3498db', '#9b59b6', '#f1c40f', 
            '#1abc9c', '#e74c3c', '#2ecc71', '#34495e'
        ];

        const numSegments = sports.length;
        const arcSize = (2 * Math.PI) / numSegments;
        let currentRotation = 0;

        function drawWheel() {
            for (let i = 0; i < numSegments; i++) {
                const angle = i * arcSize;
                
                // Draw segment
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 200, angle, angle + arcSize);
                ctx.lineTo(200, 200);
                ctx.fill();
                ctx.stroke();

                // Add text
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(sports[i], 180, 10);
                ctx.restore();
            }
        }

        function spin() {
            spinBtn.disabled = true;
            resultDiv.innerText = "Spinning...";
            
            // Generate a random rotation between 5 and 10 full circles + random offset
            const extraDegrees = Math.floor(Math.random() * 360);
            const totalSpin = (360 * (5 + Math.floor(Math.random() * 5))) + extraDegrees;
            
            currentRotation += totalSpin;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // Calculate which segment it lands on
            // The pointer is at the top (-90 degrees or 270 degrees in canvas terms)
            setTimeout(() => {
                spinBtn.disabled = false;
                
                // Normalize rotation to 0-360
                const actualRotation = currentRotation % 360;
                
                // The canvas draws 0 at the "3 o'clock" position. 
                // We need to find what is under the pointer at "12 o'clock" (270 deg)
                // Formula: (PointerAngle - RotationAngle) converted to index
                const winningIndex = Math.floor((360 - (actualRotation % 360) + 270) % 360 / (360 / numSegments));
                
                resultDiv.innerText = "You got: " + sports[winningIndex] + "!";
            }, 4000);
        }

        drawWheel();
        spinBtn.addEventListener('click', spin);

    </script>
</body>
</html>
