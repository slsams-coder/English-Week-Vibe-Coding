
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyscraper Tetris</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 2px solid #334155;
        }
        canvas {
            border: 4px solid #475569;
            background: #020617;
            border-radius: 4px;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 150px;
        }
        .stat-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #38bdf8; }
        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #94a3b8;
        }
        #game-over {
            position: absolute;
            background: rgba(15, 23, 42, 0.9);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            display: none;
            border: 2px solid #ef4444;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>City Builder Tetris</h1>
    
    <div id="game-container">
        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="side-panel">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div id="score" class="stat-value">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Floors</div>
                <div id="lines" class="stat-value">0</div>
            </div>
            <div class="controls">
                Arrows: Move/Rotate<br>
                Down: Soft Drop
            </div>
        </div>
    </div>

    <div id="game-over">
        <h2 style="color: #ef4444;">CITY COLLAPSED</h2>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="location.reload()">Rebuild City</button>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');

        context.scale(20, 20);

        // Building colors and window patterns
        const colors = [
            null,
            '#38bdf8', // Residential (Blue)
            '#fbbf24', // Commercial (Gold)
            '#a855f7', // Industrial (Purple)
            '#22c55e', // Park/Eco (Green)
            '#ef4444', // Danger/Fire (Red)
            '#f97316', // Construction (Orange)
            '#64748b', // Modern (Slate)
        ];

        function createPiece(type) {
            if (type === 'I') {
                return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            } else if (type === 'L') {
                return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            } else if (type === 'J') {
                return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            } else if (type === 'O') {
                return [[4, 4], [4, 4]];
            } else if (type === 'Z') {
                return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            } else if (type === 'S') {
                return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            } else if (type === 'T') {
                return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
            }
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        // Draw Main Building Block
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // Draw Windows (Detailing)
                        context.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        context.fillRect(x + offset.x + 0.2, y + offset.y + 0.2, 0.2, 0.2);
                        context.fillRect(x + offset.x + 0.6, y + offset.y + 0.2, 0.2, 0.2);
                        context.fillRect(x + offset.x + 0.2, y + offset.y + 0.6, 0.2, 0.2);
                        context.fillRect(x + offset.x + 0.6, y + offset.y + 0.6, 0.2, 0.2);
                        
                        // Stroke for block definition
                        context.lineWidth = 0.05;
                        context.strokeStyle = '#020617';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function createArena(w, h) {
            const matrix = [];
            while (h--) { matrix.push(new Array(w).fill(0)); }
            return matrix;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) { continue outer; }
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                player.lines += 1;
                rowCount *= 2;
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) { matrix.forEach(row => row.reverse()); }
            else { matrix.reverse(); }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) { player.pos.x -= dir; }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) {
                isGameOver = true;
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = player.score;
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            linesElement.innerText = player.lines;
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isGameOver = false;

        function update(time = 0) {
            if (isGameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) { playerDrop(); }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            context.fillStyle = '#020617';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        const arena = createArena(12, 20);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0, lines: 0 };

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) { playerMove(-1); }
            else if (event.keyCode === 39) { playerMove(1); }
            else if (event.keyCode === 40) { playerDrop(); }
            else if (event.keyCode === 38) { playerRotate(1); }
        });

        playerReset();
        updateScore();
        update();
    </script>
</body>
</html>
